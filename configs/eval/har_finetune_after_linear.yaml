# Finetuning-after-linear evaluation config for Capture-24 HAR
run:
  out_dir: results/finetune/har_finetune_after_linear
  amp: bfloat16
  encoder: pretrain/ViTS_capture24/checkpoint.pt  # path to pretrain checkpoint
  task: har
  dataset_type: har

# dataset path (set data_dir to your dataset location)
dataset:
  data_dir: /path/to/capture-24

# data
crop_duration: null
crop_stride: null
# model architecture
use_register: True
attn_pooling: True
layer_scale_eps: 0.
bias: False
dropout: 0.1
frozen: False
# training
epochs: 25
batch_size: 1024
learning_rate: 1.0e-4
final_learning_rate: 1.0e-6
learning_rate_warmup_ratio: 0.05
weight_decay: 0.
opt_betas: [0.9, 0.999]
gradient_clip: 1.0
early_stopping_patience: 15
checkpoint_interval: 1000
