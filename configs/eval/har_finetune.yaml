# Finetuning evaluation config for Capture-24 HAR
run:
  out_dir: results/finetune/har_finetune
  amp: bfloat16
  encoder: pretrain/ViTS_capture24/checkpoint.pt  # path to pretrain checkpoint
  task: har
  dataset_type: har

# dataset path (set data_dir to your dataset location)
dataset:
  data_dir: /path/to/capture-24

# data
crop_duration: null
crop_stride: null
# model architecture
use_register: True
attn_pooling: False
layer_scale_eps: 0.
bias: False
dropout: 0.05
frozen: False
# training
epochs: 25
batch_size: 1024
learning_rate: 1.0e-3
final_learning_rate: 1.0e-5
learning_rate_warmup_ratio: 0.05
weight_decay: 1.0e-2
opt_betas: [0.9, 0.99]
gradient_clip: 0.
early_stopping_patience: 15
checkpoint_interval: 1000
