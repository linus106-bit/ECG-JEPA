# run (execution settings — previously in the shell script)
run:
  num_gpus: 8
  out_dir: finetune/finetune_after_linear
  amp: bfloat16
  encoder: pretrain/ViTS_ptbxl/checkpoint.pt  # path to pretrain checkpoint
  task: all
  dataset_type: ecg

# dataset path (set data_dir to your dataset location)
# dataset:
#   data_dir: /path/to/ptb-xl

# data
crop_duration: 2.5
crop_stride: 1.25
# model architecture
use_register: True
attn_pooling: True
layer_scale_eps: 0.
bias: False
dropout: 0.1
frozen: False
# training
epochs: 40
batch_size: 128
learning_rate: 1.0e-4
final_learning_rate: 1.0e-6
learning_rate_warmup_ratio: 0.05
weight_decay: 0.
opt_betas: [0.9, 0.999]
gradient_clip: 1.0
early_stopping_patience: 15
checkpoint_interval: 500