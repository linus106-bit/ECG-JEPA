# run (execution settings — previously in the shell script)
run:
  out_dir: results/finetune/linear
  amp: bfloat16
  encoder: pretrain/ViTS_ptbxl/checkpoint.pt  # path to pretrain checkpoint
  task: all
  dataset_type: ecg

# dataset path (set data_dir to your dataset location)
# dataset:
#   data_dir: /path/to/ptb-xl

# data
crop_duration: 2.5
crop_stride: 1.25
# model architecture
use_register: True
attn_pooling: True
layer_scale_eps: 0.
bias: False
dropout: 0.
frozen: True
# training
epochs: 40
batch_size: 128
learning_rate: 1.0e-3
final_learning_rate: 1.0e-3
learning_rate_warmup_ratio: 0.0
weight_decay: 1.0e-1
opt_betas: [0.9, 0.999]
gradient_clip: 1.
early_stopping_patience: 15
checkpoint_interval: 1000
