# Linear evaluation config for Capture-24 HAR
# run (execution settings — previously in the shell script)
run:
  num_gpus: 8
  out_dir: finetune/har_linear
  amp: bfloat16
  encoder: pretrain/ViTS_capture24/checkpoint.pt  # path to pretrain checkpoint
  task: har
  dataset_type: har

# dataset path (set data_dir to your dataset location)
# dataset:
#   data_dir: /path/to/capture-24

# data
crop_duration: null
crop_stride: null
# model architecture
use_register: True
attn_pooling: True
layer_scale_eps: 0.
bias: False
dropout: 0.
frozen: True
# training
epochs: 50
batch_size: 256
learning_rate: 1.0e-3
final_learning_rate: 1.0e-3
learning_rate_warmup_ratio: 0.0
weight_decay: 1.0e-1
opt_betas: [0.9, 0.999]
gradient_clip: 1.
early_stopping_patience: 10
checkpoint_interval: 500
