# run (execution settings — previously in the shell script)
run:
  out_dir: results/finetune/finetune
  amp: bfloat16
  encoder: pretrain/ViTS_ptbxl/checkpoint.pt  # path to pretrain checkpoint
  task: all
  dataset_type: ecg

# dataset path (set data_dir to your dataset location)
# dataset:
#   data_dir: /path/to/ptb-xl

# data
crop_duration: 2.5
crop_stride: 1.25
# model architecture
use_register: True
attn_pooling: False
layer_scale_eps: 0.
bias: False
dropout: 0.05
frozen: False
# training
epochs: 80
batch_size: 128
learning_rate: 1.0e-3
final_learning_rate: 1.0e-5
learning_rate_warmup_ratio: 0.05
weight_decay: 1.0e-2
opt_betas: [0.9, 0.99]
gradient_clip: 0.
early_stopping_patience: 15
checkpoint_interval: 500
