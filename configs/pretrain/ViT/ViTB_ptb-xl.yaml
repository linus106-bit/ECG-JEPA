# learnable encoder parameters: 14,277,888
run:
  out_dir: results/pretrain/ptb-xl-1.0.1
  amp: bfloat16
  compile: false
  checkpoint: null  # set to a checkpoint path to resume training
# data
sampling_frequency: 500
channels: [I, II, III, AVR, AVL, AVF, V1, V2, V3, V4, V5, V6]
channel_size: 5000
patch_size: 25
min_block_size: 10
min_keep_ratio: 0.15
max_keep_ratio: 0.25
datasets:
  ptb-xl:
    path: /group-volume/DiffusionLM/datasets/sensor/public_dataset/ptb-xl-1.0.1/ptb-xl-1.0.1.npy
    split: train
    weight: 1.
# model architecture
dim: 768
depth: 12
num_heads: 12
pred_dim: 384
pred_depth: 12
pred_num_heads: 12
mlp_ratio: 4.
qkv_bias: False
dropout: 0.
attn_dropout: 0.
num_registers: 1
bias: False
norm_eps: 1.0e-6
layer_scale_eps: 0.
# training
epochs: 2000
batch_size: 2048
encoder_momentum: 0.998
final_encoder_momentum: 0.9995
learning_rate: 1.0e-3
final_learning_rate: 1.0e-6
learning_rate_warmup_ratio: 0.05
weight_decay: 1.0e-2
final_weight_decay: 1.0e-1
opt_betas: [0.9, 0.99]
opt_eps: 1.0e-6
gradient_clip: 0
gradient_accumulation_steps: 1
checkpoint_interval: 1000
