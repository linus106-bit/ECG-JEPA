# ViT-Small for SDB (Sleep Disorder Breathing) pretraining
# run (execution settings — previously in the shell script)
run:
  out_dir: results/pretrain/ViTS_sdb
  amp: bfloat16
  compile: false
  checkpoint: null  # set to a checkpoint path to resume training
# data
sampling_frequency: 100
channels: [green]
channel_size: 1000
patch_size: 20
min_block_size: 5
min_keep_ratio: 0.15
max_keep_ratio: 0.25
datasets:
  sdb:
    path: /path/to/sdb  # HF dataset directory
    split: train
    weight: 1.
    variable_length: true
# model architecture
dim: 384
depth: 8
num_heads: 6
pred_dim: 192
pred_depth: 8
pred_num_heads: 6
mlp_ratio: 4.
qkv_bias: False
dropout: 0.
attn_dropout: 0.
num_registers: 1
bias: False
norm_eps: 1.0e-6
layer_scale_eps: 0.
# training
epochs: 300
batch_size: 2048
encoder_momentum: 0.998
final_encoder_momentum: 0.9995
learning_rate: 1.0e-3
final_learning_rate: 1.0e-6
learning_rate_warmup_ratio: 0.05
weight_decay: 1.0e-2
final_weight_decay: 1.0e-1
opt_betas: [0.9, 0.99]
opt_eps: 1.0e-6
gradient_clip: 0
gradient_accumulation_steps: 1
checkpoint_interval: 1000
